name: release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v), MUST be X.Y.Z, e.g. 0.1.0"
        required: true

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------
  # 0. Resolve version + sanity-check it matches the workspace Cargo.toml
  # ---------------------------------------------------------------------
  meta:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag:     ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VER="${{ inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER"    >> "$GITHUB_OUTPUT"
      - name: Validate tag format (must be vX.Y.Z)
        run: |
          VER="${{ steps.v.outputs.version }}"
          if [[ ! "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version '$VER' is not in strict X.Y.Z form (tag must be vX.Y.Z)"
            exit 1
          fi
          echo "Releasing v${VER}; the workspace Cargo.toml will be rewritten to match in every build job."

  # ---------------------------------------------------------------------
  # 1. Source tarball (used by Arch PKGBUILD + RPM srpm + checksums)
  # ---------------------------------------------------------------------
  source-tarball:
    needs: meta
    runs-on: ubuntu-24.04
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Pin workspace Cargo.toml to release version
        run: bash scripts/set-release-version.sh "${{ needs.meta.outputs.version }}"
      - name: Create source tarball
        run: |
          V="${{ needs.meta.outputs.version }}"
          PREFIX="ProtonDrive-Linux-${V}"
          mkdir -p "/tmp/${PREFIX}"
          tar --exclude='.git' --exclude='target' --exclude='dist' \
              -cf - . | tar -xf - -C "/tmp/${PREFIX}"
          tar -czf "protondrive-linux-${V}.tar.gz" -C /tmp "${PREFIX}"
      - id: sha
        run: |
          V="${{ needs.meta.outputs.version }}"
          SHA=$(sha256sum "protondrive-linux-${V}.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: protondrive-linux-*.tar.gz

  # ---------------------------------------------------------------------
  # 2. Build native binaries on Ubuntu (used by .deb + AppImage)
  # ---------------------------------------------------------------------
  build-linux-x86_64:
    needs: meta
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Pin workspace Cargo.toml to release version
        run: bash scripts/set-release-version.sh "${{ needs.meta.outputs.version }}"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential \
            libgtk-4-dev libadwaita-1-dev \
            libsecret-1-dev libssl-dev libdbus-1-dev \
            libwebkit2gtk-4.1-dev \
            libfuse-dev fuse
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release (workspace)
        run: cargo build --release --workspace --locked
      - name: Build protondrive-hv (standalone GTK3 webview helper)
        run: |
          cd crates/protondrive-hv
          cargo build --release
      - name: Stage Go bridge .so next to the binaries
        run: |
          SO=$(find target/release/build -maxdepth 4 -name libprotonbridge.so | head -n1)
          if [[ -z "$SO" ]]; then
            echo "::error::libprotonbridge.so was not produced"
            exit 1
          fi
          install -Dm0755 "$SO" target/release/libprotonbridge.so
      - uses: actions/upload-artifact@v4
        with:
          name: release-bins-linux-x86_64
          path: |
            target/release/protondrive
            target/release/protondrived
            target/release/protondrive-cli
            target/release/libprotonbridge.so
            crates/protondrive-hv/target/release/protondrive-hv

  # ---------------------------------------------------------------------
  # 3. .deb (Debian/Ubuntu/Mint/Pop_OS!)
  # ---------------------------------------------------------------------
  package-deb:
    needs: [meta, build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Pin workspace Cargo.toml to release version
        run: bash scripts/set-release-version.sh "${{ needs.meta.outputs.version }}"
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgtk-4-dev libadwaita-1-dev \
            libsecret-1-dev libssl-dev libdbus-1-dev \
            libwebkit2gtk-4.1-dev \
            libfuse-dev fuse
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Restore release binaries
        uses: actions/download-artifact@v4
        with: { name: release-bins-linux-x86_64, path: . }
      - name: Stage binaries
        run: |
          # Move protondrive-hv from crate subdir to target/release/
          if [[ -f "crates/protondrive-hv/target/release/protondrive-hv" ]]; then
            mv crates/protondrive-hv/target/release/protondrive-hv target/release/protondrive-hv
          fi
          chmod +x target/release/protondrive target/release/protondrived \
                   target/release/protondrive-cli target/release/protondrive-hv \
                   target/release/libprotonbridge.so 2>/dev/null || true
      - name: Install cargo-deb
        run: cargo install --locked cargo-deb
      - name: Build .deb
        run: |
          cargo deb -p protondrive-ui --no-build --no-strip \
            --output "protondrive-linux_${{ needs.meta.outputs.version }}_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"

  # ---------------------------------------------------------------------
  # 4. .rpm (Fedora/openSUSE/RHEL)
  # ---------------------------------------------------------------------
  package-rpm:
    needs: [meta, source-tarball]
    runs-on: ubuntu-24.04
    container: fedora:41
    steps:
      - name: Install build env
        run: |
          dnf install -y rpm-build rpmdevtools gcc make golang \
            gtk4-devel libadwaita-devel libsecret-devel \
            openssl-devel dbus-devel pkgconf-pkg-config systemd-rpm-macros tar \
            webkit2gtk4.1-devel \
            curl-minimal ca-certificates
          # Fedora 41's bundled rustc (1.86) is too old for some workspace
          # dependencies (home@0.5.12 needs 1.88+). Install an up-to-date
          # toolchain via rustup so we always build with current stable.
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - uses: actions/download-artifact@v4
        with: { name: source-tarball, path: . }
      - name: Render spec + stage tarball
        run: |
          V="${{ needs.meta.outputs.version }}"
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,RPMS,SRPMS,BUILD,BUILDROOT}
          cp "protondrive-linux-${V}.tar.gz" ~/rpmbuild/SOURCES/
          tar -xzf "protondrive-linux-${V}.tar.gz"
          sed "s|{VERSION}|${V}|g" \
            "ProtonDrive-Linux-${V}/packaging/rpm/protondrive-linux.spec.in" \
            > ~/rpmbuild/SPECS/protondrive-linux.spec
      - name: rpmbuild
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          rpmbuild -ba ~/rpmbuild/SPECS/protondrive-linux.spec
      - name: Collect rpms
        run: |
          mkdir out
          find ~/rpmbuild/RPMS  -name '*.rpm' -exec cp {} out/ \;
          find ~/rpmbuild/SRPMS -name '*.rpm' -exec cp {} out/ \;
          ls -la out/
      - uses: actions/upload-artifact@v4
        with: { name: rpm, path: out/*.rpm }

  # ---------------------------------------------------------------------
  # 5. Arch PKGBUILD + .SRCINFO (artifact only; AUR push happens AFTER release)
  # ---------------------------------------------------------------------
  package-arch:
    needs: [meta, source-tarball]
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest
    steps:
      - name: Install makepkg + tools
        run: |
          pacman -Syu --noconfirm base-devel git sudo
          # makepkg refuses to run as root; create a build user
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
      - uses: actions/checkout@v4
      - name: Render PKGBUILD + generate .SRCINFO
        run: |
          V="${{ needs.meta.outputs.version }}"
          SHA="${{ needs.source-tarball.outputs.sha256 }}"
          mkdir -p out
          sed -e "s|{VERSION}|${V}|g" -e "s|{SHA256}|${SHA}|g" \
            packaging/arch/PKGBUILD.in > out/PKGBUILD
          chown -R builder out
          su builder -c 'cd out && makepkg --printsrcinfo > .SRCINFO'
          cat out/.SRCINFO
      - uses: actions/upload-artifact@v4
        with:
          name: arch-pkgbuild
          path: |
            out/PKGBUILD
            out/.SRCINFO

  # ---------------------------------------------------------------------
  # 6. AppImage (works on essentially any glibc-based distro)
  # ---------------------------------------------------------------------
  package-appimage:
    needs: [meta, build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime libs (so linuxdeploy can bundle them)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-1 libadwaita-1-0 libsecret-1-0 \
            libgtk-4-dev libadwaita-1-dev \
            libwebkit2gtk-4.1-0 libwebkit2gtk-4.1-dev \
            libgdk-pixbuf-2.0-0 libgdk-pixbuf2.0-bin librsvg2-common \
            file desktop-file-utils patchelf wget ca-certificates
      - name: Restore release binaries
        uses: actions/download-artifact@v4
        with: { name: release-bins-linux-x86_64, path: . }
      - name: Stage binaries
        run: |
          # Move protondrive-hv from crate subdir to target/release/
          if [[ -f "crates/protondrive-hv/target/release/protondrive-hv" ]]; then
            mv crates/protondrive-hv/target/release/protondrive-hv target/release/protondrive-hv
          fi
          chmod +x target/release/protondrive target/release/protondrived \
                   target/release/protondrive-cli target/release/protondrive-hv \
                   target/release/libprotonbridge.so 2>/dev/null || true
      - name: Fetch linuxdeploy + GTK plugin
        run: |
          mkdir -p $HOME/.local/bin
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -O $HOME/.local/bin/linuxdeploy
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh \
            -O $HOME/.local/bin/linuxdeploy-plugin-gtk
          chmod +x $HOME/.local/bin/linuxdeploy $HOME/.local/bin/linuxdeploy-plugin-gtk
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh "${{ needs.meta.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with: { name: appimage, path: "*.AppImage" }

  # ---------------------------------------------------------------------
  # 7. Flatpak
  # ---------------------------------------------------------------------
  package-flatpak:
    needs: meta
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Pin workspace Cargo.toml to release version
        run: bash scripts/set-release-version.sh "${{ needs.meta.outputs.version }}"
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: protondrive-linux-${{ needs.meta.outputs.version }}.flatpak
          manifest-path: packaging/flatpak/me.proton.drive.Linux.yaml
          cache-key: flatpak-builder-${{ github.sha }}

  # ---------------------------------------------------------------------
  # 8. Publish: collect every artifact and attach to a GitHub Release
  # ---------------------------------------------------------------------
  release:
    needs: [meta, source-tarball, package-deb, package-rpm, package-arch, package-appimage, package-flatpak]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Flatten + checksum
        run: |
          mkdir release
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
                              -o -name '*.flatpak' -o -name '*.tar.gz' -o -name 'PKGBUILD' \
                              -o -name '.SRCINFO' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS
          ls -la
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: release/*


