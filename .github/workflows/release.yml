name: release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without leading v), e.g. 0.1.0"
        required: true

permissions:
  contents: write   # create the GitHub Release & upload assets
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------
  # 0. Resolve version from the tag (or workflow_dispatch input)
  # ---------------------------------------------------------------------
  meta:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag:     ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VER="${{ inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER"    >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # 1. Source tarball (used by Arch PKGBUILD + RPM srpm + checksums)
  # ---------------------------------------------------------------------
  source-tarball:
    needs: meta
    runs-on: ubuntu-24.04
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Create source tarball
        run: |
          V="${{ needs.meta.outputs.version }}"
          PREFIX="ProtonDrive-Linux-${V}"
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "protondrive-linux-${V}.tar.gz" HEAD
      - id: sha
        run: |
          V="${{ needs.meta.outputs.version }}"
          SHA=$(sha256sum "protondrive-linux-${V}.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: source-tarball
          path: protondrive-linux-*.tar.gz

  # ---------------------------------------------------------------------
  # 2. Build native binaries on Ubuntu (used by .deb + AppImage)
  # ---------------------------------------------------------------------
  build-linux-x86_64:
    needs: meta
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential \
            libgtk-4-dev libadwaita-1-dev \
            libfuse3-dev libsecret-1-dev libssl-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --release
        run: cargo build --release --workspace --locked
      - uses: actions/upload-artifact@v4
        with:
          name: release-bins-linux-x86_64
          path: |
            target/release/protondrive
            target/release/protondrive-fs
            target/release/protondrive-cli

  # ---------------------------------------------------------------------
  # 3. .deb (Debian/Ubuntu/Mint/Pop_OS!)
  # ---------------------------------------------------------------------
  package-deb:
    needs: [meta, build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libgtk-4-dev libadwaita-1-dev \
            libfuse3-dev libsecret-1-dev libssl-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Restore release binaries
        uses: actions/download-artifact@v4
        with: { name: release-bins-linux-x86_64, path: target/release }
      - run: chmod +x target/release/protondrive*
      - name: Install cargo-deb
        run: cargo install --locked cargo-deb
      - name: Build .deb
        run: |
          cargo deb -p protondrive-ui --no-build --no-strip \
            --output "protondrive-linux_${{ needs.meta.outputs.version }}_amd64.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"

  # ---------------------------------------------------------------------
  # 4. .rpm (Fedora/openSUSE/RHEL)
  # ---------------------------------------------------------------------
  package-rpm:
    needs: [meta, source-tarball]
    runs-on: ubuntu-24.04
    container: fedora:40
    steps:
      - name: Install build env
        run: |
          dnf install -y rpm-build rpmdevtools cargo rust gcc make \
            gtk4-devel libadwaita-devel fuse3-devel libsecret-devel \
            openssl-devel dbus-devel pkgconf-pkg-config systemd-rpm-macros tar
      - uses: actions/download-artifact@v4
        with: { name: source-tarball, path: . }
      - name: Render spec
        run: |
          V="${{ needs.meta.outputs.version }}"
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,RPMS,SRPMS,BUILD,BUILDROOT}
          cp "protondrive-linux-${V}.tar.gz" ~/rpmbuild/SOURCES/
          tar -xzf "protondrive-linux-${V}.tar.gz"
          sed \
            -e "s|{VERSION}|${V}|g" \
            -e "s|{SOURCE_URL}|https://github.com/${{ github.repository }}/archive/refs/tags/v${V}.tar.gz|g" \
            "ProtonDrive-Linux-${V}/packaging/rpm/protondrive-linux.spec.in" \
            > ~/rpmbuild/SPECS/protondrive-linux.spec
      - name: rpmbuild
        run: rpmbuild -ba ~/rpmbuild/SPECS/protondrive-linux.spec
      - name: Collect rpms
        run: |
          mkdir out
          find ~/rpmbuild/RPMS  -name '*.rpm' -exec cp {} out/ \;
          find ~/rpmbuild/SRPMS -name '*.rpm' -exec cp {} out/ \;
          ls -la out/
      - uses: actions/upload-artifact@v4
        with: { name: rpm, path: out/*.rpm }

  # ---------------------------------------------------------------------
  # 5. Arch PKGBUILD (artifact + AUR publish)
  # ---------------------------------------------------------------------
  package-arch:
    needs: [meta, source-tarball]
    runs-on: ubuntu-24.04
    outputs:
      sha256: ${{ needs.source-tarball.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Render PKGBUILD + .SRCINFO
        run: |
          V="${{ needs.meta.outputs.version }}"
          SHA="${{ needs.source-tarball.outputs.sha256 }}"
          mkdir -p out
          sed -e "s|{VERSION}|${V}|g" -e "s|{SHA256}|${SHA}|g" \
            packaging/arch/PKGBUILD.in  > out/PKGBUILD
          sed -e "s|{VERSION}|${V}|g" -e "s|{SHA256}|${SHA}|g" \
            packaging/arch/.SRCINFO.in  > out/.SRCINFO
      - uses: actions/upload-artifact@v4
        with:
          name: arch-pkgbuild
          path: out/

  publish-aur:
    needs: [meta, package-arch]
    runs-on: ubuntu-24.04
    # Only push to the AUR for real tag releases; skip on workflow_dispatch dry-runs.
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with: { name: arch-pkgbuild, path: arch }
      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.2
        with:
          pkgname: protondrive-linux
          pkgbuild: arch/PKGBUILD
          assets: |
            arch/.SRCINFO
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email:    ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Release ${{ needs.meta.outputs.tag }}"
          ssh_keyscan_types: "rsa,ecdsa,ed25519"

  # ---------------------------------------------------------------------
  # 6. AppImage (works on essentially any glibc-based distro)
  # ---------------------------------------------------------------------
  package-appimage:
    needs: [meta, build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install runtime libs (so linuxdeploy can bundle them)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-1 libadwaita-1-0 libfuse3-3 libsecret-1-0 \
            libgdk-pixbuf-2.0-0 librsvg2-common file desktop-file-utils \
            patchelf wget ca-certificates
      - name: Restore release binaries
        uses: actions/download-artifact@v4
        with: { name: release-bins-linux-x86_64, path: target/release }
      - run: chmod +x target/release/protondrive*
      - name: Fetch linuxdeploy + GTK plugin
        run: |
          mkdir -p $HOME/.local/bin
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage           -O $HOME/.local/bin/linuxdeploy
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh         -O $HOME/.local/bin/linuxdeploy-plugin-gtk
          chmod +x $HOME/.local/bin/linuxdeploy $HOME/.local/bin/linuxdeploy-plugin-gtk
          # Run AppImages without FUSE on the runner.
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> $GITHUB_ENV
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh "${{ needs.meta.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with: { name: appimage, path: "*.AppImage" }

  # ---------------------------------------------------------------------
  # 7. Flatpak
  # ---------------------------------------------------------------------
  package-flatpak:
    needs: meta
    runs-on: ubuntu-24.04
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: protondrive-linux-${{ needs.meta.outputs.version }}.flatpak
          manifest-path: packaging/flatpak/me.proton.drive.Linux.yaml
          cache-key: flatpak-builder-${{ github.sha }}

  # ---------------------------------------------------------------------
  # 8. Publish: collect every artifact and attach to a GitHub Release
  # ---------------------------------------------------------------------
  release:
    needs: [meta, source-tarball, package-deb, package-rpm, package-arch, package-appimage, package-flatpak]
    runs-on: ubuntu-24.04
    if: github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Flatten + checksum
        run: |
          mkdir release
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \
                              -o -name '*.flatpak' -o -name '*.tar.gz' -o -name 'PKGBUILD' \
                              -o -name '.SRCINFO' \) -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: ${{ needs.meta.outputs.tag }}
          generate_release_notes: true
          files: release/*
