app-id: me.proton.drive.Linux
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.golang
command: protondrive
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/golang/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/protondrive-linux/cargo
modules:
  - name: protondrive-linux
    buildsystem: simple
    build-commands:
      - cargo fetch --manifest-path Cargo.toml --verbose
      - cargo build --release --verbose
      - install -Dm0755 target/release/protondrive       /app/bin/protondrive
      - install -Dm0755 target/release/protondrived      /app/bin/protondrived
      - install -Dm0755 target/release/protondrive-cli   /app/bin/protondrive-cli
      - install -Dm0644 packaging/desktop/me.proton.drive.Linux.desktop      /app/share/applications/me.proton.drive.Linux.desktop
      - install -Dm0644 packaging/desktop/me.proton.drive.Linux.metainfo.xml /app/share/metainfo/me.proton.drive.Linux.metainfo.xml
      - install -Dm0644 data/icons/me.proton.drive.Linux.svg                 /app/share/icons/hicolor/scalable/apps/me.proton.drive.Linux.svg
    sources:
      - type: dir
        path: ../..
