app-id: me.proton.drive.Linux
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.golang
command: protondrive
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --device=all
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.Notifications
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/golang/bin
  build-args:
    - --share=network
  env:
    CARGO_HOME: /run/build/protondrive-linux/cargo
modules:
  # Build-time fuse3 headers (not in GNOME SDK 48 build deps).
  # At runtime libfuse.so.2 is provided by the GNOME Platform via gvfs.
  - name: fuse3
    buildsystem: meson
    config-opts:
      - -Dexamples=false
      - -Duseroot=false
      - -Dinitscriptdir=''
      - -Dudevrulesdir=/app/lib/udev/rules.d
    sources:
      - type: archive
        url: https://github.com/libfuse/libfuse/releases/download/fuse-3.16.2/fuse-3.16.2.tar.gz
        sha256: f797055d9296b275e981f5f62d4e32e089614fc253d1ef2985851025b8a0ce87

  - name: protondrive-linux
    buildsystem: simple
    build-commands:
      - cargo fetch --manifest-path Cargo.toml --verbose
      - cargo build --release --verbose
      - install -Dm0755 target/release/protondrive       /app/bin/protondrive
      - install -Dm0755 target/release/protondrived      /app/bin/protondrived
      - install -Dm0755 target/release/protondrive-cli   /app/bin/protondrive-cli
      - install -Dm0755 "$(find target/release/build -maxdepth 4 -name libprotonbridge.so | head -n1)" /app/lib/libprotonbridge.so
      - install -Dm0644 packaging/desktop/me.proton.drive.Linux.desktop      /app/share/applications/me.proton.drive.Linux.desktop
      - install -Dm0644 packaging/desktop/me.proton.drive.Linux.metainfo.xml /app/share/metainfo/me.proton.drive.Linux.metainfo.xml
      - install -Dm0644 data/icons/me.proton.drive.Linux.svg                 /app/share/icons/hicolor/scalable/apps/me.proton.drive.Linux.svg
    sources:
      - type: dir
        path: ../..
